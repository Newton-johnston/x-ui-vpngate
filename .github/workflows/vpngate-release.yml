name: Build VPNGate release

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-linux-amd64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: false
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.3"
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Build panel assets
        working-directory: frontend
        run: |
          npm ci
          npm run build
      - name: Build Linux binary
        # SQLite uses github.com/mattn/go-sqlite3 and therefore needs CGO.
        # Build on the Linux runner so the resulting binary has a native
        # Linux SQLite driver instead of the disabled-CGO stub.
        run: CGO_ENABLED=1 GOOS=linux GOARCH=amd64 go build -o x-ui .
      - name: Assemble package
        run: |
          mkdir package
          cp x-ui package/
          cp -R deploy third_party package/
          cp NOTICE LICENSE update-vpngate.sh package/
          tar -C package -czf 3x-ui-vpngate-linux-amd64.tar.gz .
      - uses: actions/upload-artifact@v4
        with:
          name: 3x-ui-vpngate-linux-amd64
          path: 3x-ui-vpngate-linux-amd64.tar.gz
      - name: Publish tagged release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: 3x-ui-vpngate-linux-amd64.tar.gz
